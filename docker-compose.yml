version: '3.9'

services:
  apu-forecast:
    build: .
    container_name: apu-power-forecast
    ports:
      - "8000:8000"
    volumes:
      # Mount model artifacts so they persist across restarts
      - ./backend/model:/app/backend/model
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
